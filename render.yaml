# Render Blueprint — use Neon for Postgres (DATABASE_URL in dashboard).
# Also set CLIENT_ORIGIN to your Netlify URL (https, no slash), plus JWT_SECRET, SMTP_*, RAZORPAY_*, etc.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: donte-web
    runtime: node
    plan: free
    buildCommand: npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: NODE_ENV=production node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
